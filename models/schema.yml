version: 2

# Definimos las fuentes de datos junto con las tablas principales del dataset
sources:
  - name: raw
    schema: raw   # nombre del dataset en BigQuery
    tables:
      - name: orders
        config:
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}
          loaded_at_field: order_date
      - name: customers
      - name: products
      - name: order_items

# Definimos los modelos junto con los tests de calidad
models:
  # Test para stg_orders: validación de datos crudos (+4 tests)
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['completed','pending','cancelled']

  # Test para stg_customers: validación de datos crudos (+3 tests)
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null

  # Test para stg_products: validación de datos crudos (+3 tests)
  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: price
        tests:
          - not_null

  # Test para stg_order_items: validación de datos crudos (+4 tests)
  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  # Test para mart_orders_summary: validación de datos procesados (+3 tests)
  - name: mart_orders_summary
    description: "Tabla de resumen de órdenes con métricas de ingresos y volumen."
    columns:
      - name: order_id
        description: "Identificador único de cada orden."
        tests:
          - not_null
          - unique
      - name: total_revenue
        description: "Ingresos totales generados por la orden."
        tests:
          - not_null

  # Test para mart_customer_ltv: validación de datos procesados (+3 tests)
  - name: mart_customer_ltv
    description: "Tabla de clientes con métricas de valor de vida (LTV) y segmentación."
    columns:
      - name: customer_id
        description: "Identificador único de cada cliente."
        tests:
          - not_null
          - unique
      - name: customer_segment
        description: "Clasificación del cliente según su comportamiento (VIP, Regular, Nuevo)."
        tests:
          - accepted_values:
              arguments:
                values: ['VIP','Regular','NUEVO']
      - name: total_orders
        description: "Número total de órdenes realizadas por el cliente."
      - name: first_order_date
        description: "Fecha de la primera orden registrada para el cliente."
      - name: last_order_date
        description: "Fecha de la última orden registrada para el cliente."